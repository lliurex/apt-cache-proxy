services:
  apt-cache-proxy:
    image: ghcr.io/definitivlegit/apt-cache-proxy:latest
    container_name: apt-cache-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist the downloaded cache packages
      - ./storage:/app/storage
      # Persist the SQLite statistics database and config
      - ./data:/app/data
    environment:
      # Example: Set configuration via environment variables for Docker
      # These will override any values in config.json inside the container
      - APT_PROXY_PORT=8080
      - APT_PROXY_CACHE_DAYS=10
      - APT_PROXY_LOG_LEVEL=INFO
      - APT_PROXY_ADMIN_TOKEN=supersecret_docker_token